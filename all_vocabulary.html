<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>단어장 - 전체 모음</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#0d0d0d;
  color:#f0f0f0;
  font-family:'Segoe UI',sans-serif;
  min-height:100vh;
  padding-bottom:60px;
}
.top{padding:28px 24px 0;text-align:center;}
h1{
  font-size:1.9rem;font-weight:900;color:#c8ff00;
  letter-spacing:2px;margin-bottom:6px;
  text-shadow:0 0 20px #c8ff0040;
}
.subtitle{font-size:0.8rem;color:#555;margin-bottom:18px;}

.prog-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:0 24px;margin-bottom:8px;
}
.prog-text{font-size:0.9rem;color:#aaa;}
.btn-reset{
  background:#1a1a1a;border:1px solid #333;color:#aaa;
  font-size:0.82rem;padding:7px 14px;border-radius:99px;cursor:pointer;
  display:flex;align-items:center;gap:5px;
}
.btn-reset:hover{border-color:#c8ff00;color:#c8ff00;}
.prog-bar{height:5px;background:#222;margin:0 0 20px;}
.prog-fill{height:100%;background:#c8ff00;transition:width 0.4s;}

.stats{display:flex;gap:8px;padding:0 24px;margin-bottom:16px;}
.stat-box{flex:1;background:#161616;border:1px solid #222;border-radius:10px;padding:10px;text-align:center;}
.stat-num{font-size:1.1rem;font-weight:700;}
.stat-lbl{font-size:0.65rem;color:#555;margin-top:2px;}
.s-total .stat-num{color:#c8ff00;}
.s-right .stat-num{color:#6bff7a;}
.s-wrong .stat-num{color:#ff6b6b;}
.s-left  .stat-num{color:#aaa;}

.filter-row{display:flex;gap:8px;padding:0 24px;margin-bottom:10px;flex-wrap:wrap;}
.f-btn{
  padding:6px 14px;border-radius:99px;border:1px solid #2a2a2a;
  background:none;color:#666;font-size:0.75rem;cursor:pointer;transition:all 0.15s;
}
.f-btn.on{background:#c8ff00;color:#000;border-color:#c8ff00;font-weight:700;}

/* 섹션 필터 */
.sec-row{display:flex;gap:6px;padding:0 24px;margin-bottom:16px;flex-wrap:wrap;}
.sec-btn{
  padding:5px 12px;border-radius:99px;border:1px solid #1e1e1e;
  background:none;color:#444;font-size:0.7rem;cursor:pointer;transition:all 0.15s;
}
.sec-btn.on{background:#222;color:#c8ff00;border-color:#333;}

.page-label{
  padding:0 24px;font-size:0.85rem;color:#888;
  margin-bottom:14px;
}
.cards{padding:0 16px;}
.word-card{
  background:#181c18;border:1px solid #1e221e;border-radius:16px;
  padding:0;margin-bottom:10px;cursor:pointer;
  transition:border-color 0.15s;overflow:hidden;
}
.word-card:hover{border-color:#2e322e;}
.word-card.correct{border-color:#6bff7a40;background:#0e180f;}
.word-card.wrong{border-color:#ff6b6b40;background:#180e0e;}
.card-main{
  display:flex;align-items:center;gap:12px;
  padding:16px 16px;
}
.card-num{font-size:0.78rem;color:#3a3a3a;min-width:22px;text-align:right;}
.card-word{font-size:1.15rem;font-weight:700;color:#c8ff00;flex:1;letter-spacing:0.3px;}
.card-tag{font-size:0.6rem;color:#444;background:#1a1a1a;border:1px solid #222;border-radius:99px;padding:2px 7px;white-space:nowrap;}
.card-status{font-size:1rem;min-width:22px;text-align:center;}
.btn-sound{
  background:none;border:none;font-size:1.4rem;
  cursor:pointer;padding:2px 4px;border-radius:8px;
  transition:transform 0.15s;line-height:1;
}
.btn-sound:active{transform:scale(0.8);}
.card-body{display:none;padding:0 16px 14px 50px;}
.word-card.revealed .card-body{display:block;}
.card-meaning{
  font-size:0.92rem;color:#b0b0b0;
  border-top:1px solid #222;padding-top:12px;margin-bottom:12px;line-height:1.5;
}
.card-btns{display:flex;gap:8px;}
.act-btn{
  flex:1;padding:9px 0;border:none;border-radius:10px;
  font-size:0.82rem;font-weight:700;cursor:pointer;transition:all 0.15s;
}
.act-wrong{background:#2a1010;color:#ff6b6b;}
.act-wrong:hover{background:#ff6b6b;color:#000;}
.act-correct{background:#0f2a10;color:#6bff7a;}
.act-correct:hover{background:#6bff7a;color:#000;}
.act-edit{background:#1a1a1a;color:#999;border:1px solid #2a2a2a;flex:none;padding:9px 14px;}
.act-edit:hover{color:#c8ff00;border-color:#c8ff00;}
.act-del{background:#1a0f0f;color:#ff4444;border:1px solid #2a1010;flex:none;padding:9px 14px;}
.act-del:hover{background:#ff4444;color:#fff;}

.bottom-nav{
  display:flex;gap:10px;justify-content:center;
  padding:20px 24px 0;
}
.nav-btn{
  padding:13px 32px;border:none;border-radius:12px;
  font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.15s;
}
.nav-prev{background:#1e1e1e;color:#888;}
.nav-prev:hover{background:#2a2a2a;}
.nav-next{background:#c8ff00;color:#000;}
.nav-next:hover{background:#aade00;}

.modal-bg{
  display:none;position:fixed;inset:0;background:#000c;
  z-index:200;align-items:center;justify-content:center;
}
.modal-bg.open{display:flex;}
.modal{
  background:#1a1a1a;border:1px solid #2a2a2a;border-radius:18px;
  padding:24px;width:90%;max-width:340px;
}
.modal h3{font-size:0.95rem;color:#c8ff00;margin-bottom:14px;}
.modal input{
  width:100%;background:#111;border:1px solid #333;color:#f0f0f0;
  font-size:0.95rem;padding:10px 12px;border-radius:8px;outline:none;margin-bottom:10px;
}
.modal input:focus{border-color:#c8ff00;}
.modal-btns{display:flex;gap:8px;margin-top:4px;}
.modal-btns button{flex:1;padding:10px;border:none;border-radius:8px;font-size:0.85rem;font-weight:700;cursor:pointer;}
.m-save{background:#c8ff00;color:#000;}
.m-cancel{background:#2a2a2a;color:#aaa;}

.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  background:#141a14;border:1px solid #c8ff0050;color:#c8ff00;
  padding:9px 22px;border-radius:99px;font-size:0.8rem;
  opacity:0;transition:opacity 0.3s;z-index:300;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="top">
  <h1>📚 전체 단어장 ⚡</h1>
  <div class="subtitle" id="totalCount">총 0개 단어</div>
</div>

<div class="prog-row">
  <span class="prog-text" id="progText">0% 완료</span>
  <button class="btn-reset" onclick="resetAll()">🔄 초기화</button>
</div>
<div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>

<div class="stats">
  <div class="stat-box s-total"><div class="stat-num" id="stTotal">0</div><div class="stat-lbl">전체</div></div>
  <div class="stat-box s-right"><div class="stat-num" id="stRight">0</div><div class="stat-lbl">✅ 맞음</div></div>
  <div class="stat-box s-wrong"><div class="stat-num" id="stWrong">0</div><div class="stat-lbl">❌ 틀림</div></div>
  <div class="stat-box s-left" ><div class="stat-num" id="stLeft">0</div><div class="stat-lbl">남은것</div></div>
</div>

<div class="filter-row">
  <button class="f-btn on" id="fall" onclick="setFilter('all')">📚 전체</button>
  <button class="f-btn" id="fwrong" onclick="setFilter('wrong')">❌ 틀린것</button>
  <button class="f-btn" id="fright" onclick="setFilter('right')">✅ 맞은것</button>
  <button class="f-btn" id="fnone" onclick="setFilter('none')">📝 안푼것</button>
</div>

<div class="sec-row">
  <button class="sec-btn on" id="sall" onclick="setSec('all')">전체</button>
  <button class="sec-btn" id="s1" onclick="setSec('문제1-3')">문제1~3</button>
  <button class="sec-btn" id="s2" onclick="setSec('지문A')">지문A</button>
  <button class="sec-btn" id="s3" onclick="setSec('10번')">10번</button>
  <button class="sec-btn" id="s4" onclick="setSec('11번')">11번</button>
  <button class="sec-btn" id="s5" onclick="setSec('15번')">15번</button>
  <button class="sec-btn" id="s6" onclick="setSec('캠프')">캠프</button>
</div>

<div class="page-label" id="pageLabel">📖 1~10 / 0</div>
<div class="cards" id="cardsEl"></div>

<div class="bottom-nav">
  <button class="nav-btn nav-prev" onclick="prevPage()">← 이전</button>
  <button class="nav-btn nav-next" onclick="nextPage()">다음 →</button>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>✏️ 단어 수정</h3>
    <input type="text" id="editEn" placeholder="영어 단어"/>
    <input type="text" id="editKo" placeholder="한국어 뜻"/>
    <div class="modal-btns">
      <button class="m-cancel" onclick="closeModal()">취소</button>
      <button class="m-save" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const BASE = [
  /* ── 문제 1~3 ── */
  {en:"acceptable", ko:"받아들일 수 있는, 허용되는", sec:"문제1-3"},
  {en:"reliable", ko:"믿을 수 있는, 신뢰할 수 있는", sec:"문제1-3"},
  {en:"universally accepted", ko:"보편적으로 인정된", sec:"문제1-3"},
  {en:"document", ko:"서류, 문서", sec:"문제1-3"},
  {en:"thereby", ko:"그렇게 함으로써", sec:"문제1-3"},
  {en:"ourselves", ko:"우리 자신을", sec:"문제1-3"},
  {en:"invaluable", ko:"매우 귀중한", sec:"문제1-3"},
  {en:"depriving", ko:"빼앗는, 박탈하는", sec:"문제1-3"},
  {en:"retailer", ko:"소매업자", sec:"문제1-3"},
  {en:"offering", ko:"제공하는", sec:"문제1-3"},
  {en:"grocery", ko:"식료품", sec:"문제1-3"},
  {en:"discovered", ko:"발견했다", sec:"문제1-3"},
  {en:"salary", ko:"급여, 월급", sec:"문제1-3"},
  {en:"recent", ko:"최근의", sec:"문제1-3"},

  /* ── 지문 (A) 플라스틱 ── */
  {en:"aim", ko:"목표로 하다", sec:"지문A"},
  {en:"exclude", ko:"제외하다, 배제하다", sec:"지문A"},
  {en:"common", ko:"흔한, 일반적인", sec:"지문A"},
  {en:"biodegradable", ko:"생분해되는", sec:"지문A"},
  {en:"materials", ko:"재료, 물질", sec:"지문A"},
  {en:"year-round", ko:"연중 내내", sec:"지문A"},
  {en:"effort", ko:"노력", sec:"지문A"},
  {en:"workplace", ko:"직장, 일터", sec:"지문A"},
  {en:"earth", ko:"지구", sec:"지문A"},
  {en:"further", ko:"더 나아가, 더욱", sec:"지문A"},
  {en:"saturated", ko:"포화된, 가득 찬", sec:"지문A"},
  {en:"convenience", ko:"편의, 편리함", sec:"지문A"},
  {en:"designed", ko:"설계된, 만들어진", sec:"지문A"},
  {en:"disposed of", ko:"처리된, 버려진", sec:"지문A"},
  {en:"across", ko:"전역에, ~에 걸쳐", sec:"지문A"},
  {en:"achieving", ko:"달성하는", sec:"지문A"},
  {en:"takeaway", ko:"테이크아웃", sec:"지문A"},
  {en:"completely", ko:"완전히", sec:"지문A"},
  {en:"development", ko:"개발, 발전", sec:"지문A"},

  /* ── 10번 농업 ── */
  {en:"can-do mentality", ko:"적극적인 사고방식", sec:"10번"},
  {en:"support", ko:"지원, 지지", sec:"10번"},
  {en:"communities", ko:"지역사회, 공동체", sec:"10번"},
  {en:"countries", ko:"나라들, 국가들", sec:"10번"},
  {en:"agriculture", ko:"농업", sec:"10번"},
  {en:"employer", ko:"고용주, 고용처", sec:"10번"},
  {en:"ensuring", ko:"보장하는", sec:"10번"},
  {en:"security", ko:"안보, 보장", sec:"10번"},
  {en:"future", ko:"미래의", sec:"10번"},
  {en:"career", ko:"직업, 경력", sec:"10번"},
  {en:"substantial", ko:"상당한, 실질적인", sec:"10번"},
  {en:"long-term", ko:"장기적인", sec:"10번"},
  {en:"investments", ko:"투자", sec:"10번"},
  {en:"heavily", ko:"크게, 심하게", sec:"10번"},
  {en:"flooding", ko:"홍수", sec:"10번"},
  {en:"drought", ko:"가뭄", sec:"10번"},
  {en:"destroy", ko:"파괴하다", sec:"10번"},
  {en:"agricultural", ko:"농업의", sec:"10번"},
  {en:"challenges", ko:"도전, 어려움", sec:"10번"},
  {en:"urban", ko:"도시의", sec:"10번"},

  /* ── 11번 도로/공원 ── */
  {en:"resident", ko:"주민, 거주자", sec:"11번"},
  {en:"reported", ko:"보고된, 신고된", sec:"11번"},
  {en:"conditions", ko:"상태, 조건", sec:"11번"},
  {en:"potholes", ko:"도로 구덩이", sec:"11번"},
  {en:"cracks", ko:"균열, 갈라진 틈", sec:"11번"},
  {en:"disruptions", ko:"혼란, 방해", sec:"11번"},
  {en:"safety", ko:"안전", sec:"11번"},
  {en:"temporary", ko:"임시의, 일시적인", sec:"11번"},
  {en:"concerned", ko:"걱정하는, 우려하는", sec:"11번"},
  {en:"streetlights", ko:"가로등", sec:"11번"},
  {en:"accidents", ko:"사고", sec:"11번"},
  {en:"lowered", ko:"낮아진, 떨어진", sec:"11번"},
  {en:"requests", ko:"요청하다", sec:"11번"},
  {en:"lighting", ko:"조명", sec:"11번"},

  /* ── 15번 HHS ── */
  {en:"nation", ko:"국가, 나라", sec:"15번"},
  {en:"fostering", ko:"촉진하는, 육성하는", sec:"15번"},
  {en:"advances", ko:"발전, 진보", sec:"15번"},
  {en:"underlying", ko:"근본적인, 기반이 되는", sec:"15번"},
  {en:"initiatives", ko:"계획, 주도권", sec:"15번"},
  {en:"operating divisions", ko:"운영 부서", sec:"15번"},
  {en:"agencies", ko:"기관들", sec:"15번"},
  {en:"administer", ko:"관리하다, 운영하다", sec:"15번"},
  {en:"domestic", ko:"국내의", sec:"15번"},
  {en:"protect", ko:"보호하다", sec:"15번"},
  {en:"interconnectedness", ko:"상호연결성", sec:"15번"},
  {en:"requires", ko:"필요로 하다", sec:"15번"},
  {en:"fulfill", ko:"이행하다, 완수하다", sec:"15번"},
  {en:"outcomes", ko:"결과, 성과", sec:"15번"},
  {en:"collaborations", ko:"협력, 협업", sec:"15번"},
  {en:"critical", ko:"중요한, 결정적인", sec:"15번"},
  {en:"objectives", ko:"목표, 목적", sec:"15번"},
  {en:"federal", ko:"연방의", sec:"15번"},

  /* ── 미술 캠프 ── */
  {en:"behind-the-scenes", ko:"무대 뒤, 비공개의", sec:"캠프"},
  {en:"individual", ko:"개인적인, 개별적인", sec:"캠프"},
  {en:"encouragement", ko:"격려, 장려", sec:"캠프"},
  {en:"exploration", ko:"탐구, 탐험", sec:"캠프"},
  {en:"experienced", ko:"경험 있는, 숙련된", sec:"캠프"},
  {en:"engage", ko:"참여하다", sec:"캠프"},
  {en:"interpretive", ko:"해석적인, 창의적인", sec:"캠프"},
  {en:"families", ko:"가족들", sec:"캠프"},
  {en:"caregivers", ko:"보호자, 돌봄 제공자", sec:"캠프"},
  {en:"artwork", ko:"작품, 미술 작품", sec:"캠프"},
  {en:"celebrate", ko:"기념하다, 축하하다", sec:"캠프"},
  {en:"achievements", ko:"성취, 업적", sec:"캠프"},
  {en:"participant", ko:"참가자", sec:"캠프"},
  {en:"whether", ko:"~인지 아닌지", sec:"캠프"},
  {en:"embassies", ko:"대사관들", sec:"캠프"},
  {en:"else", ko:"다른, 그 밖의", sec:"캠프"},
  {en:"relevant", ko:"관련된, 적절한", sec:"캠프"},
];

const KEY='all_vocab_v1', PG=10;
let state=load();
let curSec='all';

function newState(){
  return {words:BASE.map((w,i)=>({...w,id:i,deleted:false})),results:{},filter:'all',page:0};
}
function load(){
  try{const s=JSON.parse(localStorage.getItem(KEY));if(s&&s.words)return s;}catch(e){}
  return newState();
}
function save(){localStorage.setItem(KEY,JSON.stringify(state));}

function alive(){return state.words.filter(w=>!w.deleted);}
function bySec(arr){
  if(curSec==='all') return arr;
  return arr.filter(w=>w.sec===curSec);
}
function filtered(){
  let a=bySec(alive());
  if(state.filter==='wrong') return a.filter(w=>state.results[w.id]===false);
  if(state.filter==='right') return a.filter(w=>state.results[w.id]===true);
  if(state.filter==='none')  return a.filter(w=>state.results[w.id]===undefined);
  return a;
}

function render(){
  const fw=filtered(), a=alive();
  const totalPg=Math.max(1,Math.ceil(fw.length/PG));
  state.page=Math.min(state.page,totalPg-1);
  const start=state.page*PG;
  const page=fw.slice(start,start+PG);

  const right=a.filter(w=>state.results[w.id]===true).length;
  const wrong =a.filter(w=>state.results[w.id]===false).length;
  const left  =a.length-right-wrong;
  const pct   =a.length?Math.round((right+wrong)/a.length*100):0;

  document.getElementById('progText').textContent=pct+'% 완료';
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('stTotal').textContent=a.length;
  document.getElementById('stRight').textContent=right;
  document.getElementById('stWrong').textContent=wrong;
  document.getElementById('stLeft').textContent=left;
  document.getElementById('totalCount').textContent='총 '+a.length+'개 단어';

  const labels={all:'전체',wrong:'틀린것',right:'맞은것',none:'안푼것'};
  const s=start+1, e=Math.min(start+PG,fw.length);
  document.getElementById('pageLabel').textContent=
    `📖 ${fw.length?s:0}~${fw.length?e:0} / ${fw.length} 【${labels[state.filter]}${curSec!=='all'?' · '+curSec:''}】`;

  const el=document.getElementById('cardsEl');
  el.innerHTML='';
  if(!page.length){
    el.innerHTML='<div style="text-align:center;color:#333;padding:50px 0;font-size:0.9rem;">해당하는 단어가 없어요</div>';
    save();return;
  }

  page.forEach((w,pi)=>{
    const res=state.results[w.id];
    const div=document.createElement('div');
    div.className='word-card'+(res===true?' correct':res===false?' wrong':'');
    div.dataset.delId=w.id;

    const statusIcon=res===true?'✅':res===false?'❌':'';

    div.innerHTML=`
      <div class="card-main">
        <span class="card-num">${start+pi+1}</span>
        <span class="card-word">${w.en}</span>
        <span class="card-tag">${w.sec}</span>
        <span class="card-status">${statusIcon}</span>
        <button class="btn-sound" onclick="event.stopPropagation();speak('${w.en.replace(/'/g,"\\'")}')">🔊</button>
      </div>
      <div class="card-body">
        <div class="card-meaning">${w.ko}</div>
        <div class="card-btns">
          <button class="act-btn act-wrong"   onclick="event.stopPropagation();setResult(${w.id},false)">❌ 틀렸다</button>
          <button class="act-btn act-correct" onclick="event.stopPropagation();setResult(${w.id},true)">✅ 맞았다</button>
          <button class="act-btn act-edit"    onclick="event.stopPropagation();openEdit(${w.id})">✏️</button>
          <button class="act-btn act-del"     onclick="event.stopPropagation();delWord(${w.id})">🗑</button>
        </div>
      </div>`;

    div.querySelector('.card-main').addEventListener('click',()=>div.classList.toggle('revealed'));
    el.appendChild(div);
  });
  save();
}

function speak(w){
  if(!('speechSynthesis' in window)){showToast('⚠️ 발음 미지원');return;}
  const u=new SpeechSynthesisUtterance(w);
  u.lang='en-US';u.rate=0.85;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}
function setResult(id,ok){
  state.results[id]=ok;
  showToast(ok?'✅ 맞았다!':'❌ 틀렸다!');
  render();
}
function delWord(id){
  const existing=document.getElementById('del-confirm-'+id);
  if(existing){existing.remove();return;}
  const card=document.querySelector(`[data-del-id="${id}"]`);
  const box=document.createElement('div');
  box.id='del-confirm-'+id;
  box.style.cssText='display:flex;gap:8px;padding:8px 16px 12px 50px;';
  box.innerHTML=`
    <span style="flex:1;font-size:0.82rem;color:#ff6b6b;align-self:center;">정말 삭제할까요?</span>
    <button onclick="confirmDel(${id})" style="background:#ff4444;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:0.82rem;font-weight:700;cursor:pointer;">삭제</button>
    <button onclick="cancelDel(${id})" style="background:#2a2a2a;color:#aaa;border:none;border-radius:8px;padding:7px 14px;font-size:0.82rem;cursor:pointer;">취소</button>`;
  if(card) card.appendChild(box);
}
function confirmDel(id){
  const w=state.words.find(x=>x.id===id);if(!w)return;
  w.deleted=true;delete state.results[id];
  showToast('🗑 삭제했어!');render();
}
function cancelDel(id){
  const box=document.getElementById('del-confirm-'+id);
  if(box)box.remove();
}

let editId=null;
function openEdit(id){
  const w=state.words.find(x=>x.id===id);if(!w)return;
  editId=id;
  document.getElementById('editEn').value=w.en;
  document.getElementById('editKo').value=w.ko;
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(){editId=null;document.getElementById('modalBg').classList.remove('open');}
function saveEdit(){
  if(editId===null)return;
  const w=state.words.find(x=>x.id===editId);if(!w)return;
  w.en=document.getElementById('editEn').value.trim()||w.en;
  w.ko=document.getElementById('editKo').value.trim()||w.ko;
  closeModal();showToast('✏️ 수정됐어!');render();
}

function setFilter(f){
  state.filter=f;state.page=0;
  ['all','wrong','right','none'].forEach(x=>{
    document.getElementById('f'+x).classList.toggle('on',x===f);
  });
  render();
}

function setSec(s){
  curSec=s;state.page=0;
  ['all','문제1-3','지문A','10번','11번','15번','캠프'].forEach(x=>{
    const id='s'+(x==='all'?'all':x==='문제1-3'?'1':x==='지문A'?'2':x==='10번'?'3':x==='11번'?'4':x==='15번'?'5':'6');
    const el=document.getElementById(id);
    if(el) el.classList.toggle('on',x===s);
  });
  render();
}

function nextPage(){
  const total=Math.max(1,Math.ceil(filtered().length/PG));
  if(state.page<total-1){state.page++;render();window.scrollTo(0,0);}
}
function prevPage(){
  if(state.page>0){state.page--;render();window.scrollTo(0,0);}
}
function resetAll(){
  if(!confirm('모든 진행 상황을 초기화할까요?'))return;
  state=newState();save();render();showToast('🔄 초기화됐어!');
}

let tt;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),1800);
}

document.getElementById('modalBg').addEventListener('click',e=>{
  if(e.target===document.getElementById('modalBg'))closeModal();
});
document.addEventListener('keydown',e=>{
  if(document.getElementById('modalBg').classList.contains('open'))return;
  if(e.key==='ArrowRight')nextPage();
  else if(e.key==='ArrowLeft')prevPage();
});

render();
</script>
</body>
</html>
